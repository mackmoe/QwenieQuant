# SearXNG configuration for the Prediction AI Platform.
#
# This file is bind-mounted read-only into the container. SearXNG's own
# entrypoint only auto-generates a settings.yml when none exists at
# /etc/searxng/settings.yml, so as long as this file is mounted there,
# it is the only source of truth — nothing here gets silently
# regenerated or overwritten at runtime.
#
# Engine selection: only engines with a clear research use-case for
# prediction-market analysis are enabled. See docs/SEARXNG.md for the
# rationale behind each one. Every other engine that ships with SearXNG
# (image/video/torrent/music/code search, etc.) is left disabled.
use_default_settings:
  engines:
    keep_only:
      - duckduckgo
      - google
      - wikipedia

server:
  # SearXNG refuses to start with its own documented placeholder
  # ("ultrasecretkey"), so this must differ from that exact string — but
  # it is deliberately NOT a generated secret either. This instance has
  # no published port and is never reached by a human browser, so the
  # signing key (used only for CSRF/session tokens) carries no meaningful
  # exposure risk and doesn't need real entropy. A plain, human-readable,
  # low-entropy string is used on purpose, so nothing that resembles a
  # credential ever lands in version control, and the value stays stable
  # instead of being silently regenerated by the entrypoint on every
  # fresh deploy.
  secret_key: "prediction-ai-platform-searxng-internal-only"
  # No image proxying needed — there is no browser client to protect.
  image_proxy: false

search:
  # JSON is required for machine consumption; HTML is kept so the
  # /healthz and /config endpoints behave normally.
  formats:
    - html
    - json
