# Docker Compose foundation for the Prediction AI Platform.
#
# Services are deployed one at a time, each establishing a stable baseline
# before the next is added:
#   - ollama is deployed (SPEC-004). See docs/OLLAMA.md.
#   - searxng is deployed (SPEC-005), internal-only, no published port.
#     See docs/SEARXNG.md.
#   - postgres is deployed (SPEC-006), internal-only, no published port.
#     See docs/POSTGRES.md.
#   - prediction-api, learning-engine, and discord-control are commented
#     stubs with no application code or Dockerfile yet.
#
# Philosophy:
#   - One service, one responsibility.
#   - Everything configurable lives in .env (see .env.example).
#   - CPU-only by default. No GPU reservations anywhere.
#   - No service is added "just in case" — see docs/DOCKER_ARCHITECTURE.md
#     for why each one exists.

networks:
  # A single internal bridge network is enough for this platform's size.
  # Every service talks to every other service by container name; there is
  # no need for network segmentation until a real isolation requirement
  # appears.
  internal:
    driver: bridge

volumes:
  # Ollama's downloaded models. Large and slow to re-fetch, so persisted.
  ollama_models:
  # Postgres data directory. The only stateful data store on the platform.
  postgres_data:
  # Any runtime files SearXNG writes under /etc/searxng besides
  # settings.yml (which is bind-mounted separately, read-only, from
  # ../config/searxng/settings.yml).
  searxng_config:
  # SearXNG's on-disk query cache (/var/cache/searxng).
  searxng_cache:

services:
  # --- Local LLM inference, CPU-only ---
  # Serves the models used by prediction-api and learning-engine for
  # reasoning and prediction generation, without depending on an external
  # API provider. First production service of the platform — every other
  # service below stays disabled until it has its own deployment phase.
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    networks:
      - internal
    ports:
      # Only the Ollama API port is published, and only on localhost, so
      # local clients (and later, other containers on `internal`) can reach
      # it without exposing it beyond this machine.
      - "127.0.0.1:${OLLAMA_PORT}:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # --- Persistent storage ---
  # System of record for predictions, learning history, agent memory,
  # reflections, and platform operational records — not just a vector
  # store. Image is pgvector's own build of the official postgres image
  # (same Postgres, pgvector compiled in); no custom Dockerfile needed.
  # Internal-only: no port is published to the host. See docs/POSTGRES.md.
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    networks:
      - internal
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Runs once, only against an empty data directory: creates the
      # pgvector extension and the platform's empty schemas. See
      # docker/postgres/init/ and docs/POSTGRES.md.
      - ../docker/postgres/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # --- Self-hosted web search ---
  # Gives agents a way to research current information without depending
  # on a third-party search API. Internal-only: no port is published to
  # the host. It's reachable from other containers on the `internal`
  # network as http://searxng:8080, and is meant for machine (JSON API)
  # consumption only — see docs/SEARXNG.md.
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    networks:
      - internal
    volumes:
      - searxng_config:/etc/searxng
      - ../config/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng_cache:/var/cache/searxng
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # --- AI Core ---
  # Transforms structured prediction requests into structured AI predictions.
  # Reads model configuration from environment; calls ollama for inference.
  # No business logic, no Kalshi, no learning — orchestration only.
  # See docs/PREDICTION_API.md.
  prediction-api:
    build: ../services/prediction-api
    container_name: prediction-api
    networks:
      - internal
    ports:
      # Localhost only — for local clients and development tooling.
      - "127.0.0.1:${PREDICTION_API_PORT}:8000"
    depends_on:
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL}
      POSTGRES_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # --- Application services (not yet implemented) ---
  # Listed here so the eventual shape of the platform is visible; a future
  # phase only has to uncomment and fill in `build:` once the service exists.

