# Docker Compose foundation for the Prediction AI Platform.
#
# Services are deployed one at a time, each establishing a stable baseline
# before the next is added:
#   - ollama is deployed (SPEC-004). See docs/OLLAMA.md.
#   - searxng is deployed (SPEC-005), internal-only, no published port.
#     See docs/SEARXNG.md.
#   - postgres is deployed (SPEC-006), internal-only, no published port.
#     See docs/POSTGRES.md.
#   - prediction-api is deployed (SPEC-007/008). See docs/PREDICTION_API.md.
#   - learning-engine is deployed (SPEC-009). See docs/LEARNING_ENGINE.md.
#   - reflection-engine is deployed (SPEC-010). See docs/REFLECTION_ENGINE.md.
#   - discord-control is deployed (SPEC-011). See docs/DISCORD_CONTROL.md.
#     Requires DISCORD_BOT_TOKEN, DISCORD_GUILD_ID, ALLOWED_USER_IDS in .env.
#   - kalshi-connector is deployed (SPEC-012). See docs/KALSHI_CONNECTOR.md.
#     Requires KALSHI_API_KEY and KALSHI_PRIVATE_KEY_PATH in .env (HOTFIX-002).
#   - risk-manager is deployed (SPEC-013). See docs/RISK_MANAGER.md.
#     DRY_RUN=true by default; set to false in .env to enable live approvals.
#   - opportunity-engine is deployed (SPEC-015). See docs/OPPORTUNITY_ENGINE.md.
#     Scans Kalshi markets and ranks them by priority tier for the prediction pipeline.
#   - prediction-queue is deployed (SPEC-016). See docs/PREDICTION_QUEUE.md.
#     Traffic controller: ordered priority queue of markets awaiting prediction.
#
# Philosophy:
#   - One service, one responsibility.
#   - Everything configurable lives in .env (see .env.example).
#   - CPU-only by default. No GPU reservations anywhere.
#   - No service is added "just in case" — see docs/DOCKER_ARCHITECTURE.md
#     for why each one exists.

networks:
  # A single internal bridge network is enough for this platform's size.
  # Every service talks to every other service by container name; there is
  # no need for network segmentation until a real isolation requirement
  # appears.
  internal:
    driver: bridge

volumes:
  # Ollama's downloaded models. Large and slow to re-fetch, so persisted.
  ollama_models:
  # Postgres data directory. The only stateful data store on the platform.
  postgres_data:
  # Any runtime files SearXNG writes under /etc/searxng besides
  # settings.yml (which is bind-mounted separately, read-only, from
  # ../config/searxng/settings.yml).
  searxng_config:
  # SearXNG's on-disk query cache (/var/cache/searxng).
  searxng_cache:

services:
  # --- Local LLM inference, CPU-only ---
  # Serves the models used by prediction-api and learning-engine for
  # reasoning and prediction generation, without depending on an external
  # API provider. First production service of the platform — every other
  # service below stays disabled until it has its own deployment phase.
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    networks:
      - internal
    ports:
      # Only the Ollama API port is published, and only on localhost, so
      # local clients (and later, other containers on `internal`) can reach
      # it without exposing it beyond this machine.
      - "127.0.0.1:${OLLAMA_PORT}:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # --- Persistent storage ---
  # System of record for predictions, learning history, agent memory,
  # reflections, and platform operational records — not just a vector
  # store. Image is pgvector's own build of the official postgres image
  # (same Postgres, pgvector compiled in); no custom Dockerfile needed.
  # Internal-only: no port is published to the host. See docs/POSTGRES.md.
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    networks:
      - internal
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Runs once, only against an empty data directory: creates the
      # pgvector extension and the platform's empty schemas. See
      # docker/postgres/init/ and docs/POSTGRES.md.
      - ../docker/postgres/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # --- Self-hosted web search ---
  # Gives agents a way to research current information without depending
  # on a third-party search API. Internal-only: no port is published to
  # the host. It's reachable from other containers on the `internal`
  # network as http://searxng:8080, and is meant for machine (JSON API)
  # consumption only — see docs/SEARXNG.md.
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    networks:
      - internal
    volumes:
      - searxng_config:/etc/searxng
      - ../config/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng_cache:/var/cache/searxng
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # --- AI Core ---
  # Transforms structured prediction requests into structured AI predictions.
  # Reads model configuration from environment; calls ollama for inference.
  # No business logic, no Kalshi, no learning — orchestration only.
  # See docs/PREDICTION_API.md.
  prediction-api:
    build: ../services/prediction-api
    container_name: prediction-api
    networks:
      - internal
    ports:
      # Localhost only — for local clients and development tooling.
      - "127.0.0.1:${PREDICTION_API_PORT}:8000"
    depends_on:
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL}
      POSTGRES_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      CONFIDENCE_CALIBRATION_ENABLED: ${CONFIDENCE_CALIBRATION_ENABLED:-true}
      CONFIDENCE_MIN_HISTORY: ${CONFIDENCE_MIN_HISTORY:-25}
      CONFIDENCE_MAX_REDUCTION: ${CONFIDENCE_MAX_REDUCTION:-0.30}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # --- Learning Engine ---
  # Analyzes prediction history from PostgreSQL and produces structured
  # learning summaries with observations. No LLM calls — rule-based only.
  # Internal-only with one published port for local tooling.
  # See docs/LEARNING_ENGINE.md.
  learning-engine:
    build: ../services/learning-engine
    container_name: learning-engine
    networks:
      - internal
    ports:
      # Localhost only — for local clients and development tooling.
      - "127.0.0.1:${LEARNING_ENGINE_PORT}:8001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # --- Reflection Engine ---
  # Reviews completed learning analyses and produces structured reflections
  # identifying strengths, weaknesses, patterns, and recommendations.
  # No LLM calls — rule-based only. Reads from learning schema; writes to
  # reflection schema. See docs/REFLECTION_ENGINE.md.
  reflection-engine:
    build: ../services/reflection-engine
    container_name: reflection-engine
    networks:
      - internal
    ports:
      # Localhost only — for local clients and development tooling.
      - "127.0.0.1:${REFLECTION_ENGINE_PORT}:8002"
    depends_on:
      postgres:
        condition: service_healthy
      learning-engine:
        condition: service_healthy
    environment:
      POSTGRES_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # --- Discord Control ---
  # Operator interface: slash commands that forward to platform services.
  # Requires a valid DISCORD_BOT_TOKEN and DISCORD_GUILD_ID. The container
  # is left stopped by default; start it once credentials are in .env.
  # See docs/DISCORD_CONTROL.md.
  discord-control:
    build: ../services/discord-control
    container_name: discord-control
    networks:
      - internal
    depends_on:
      prediction-api:
        condition: service_healthy
      learning-engine:
        condition: service_healthy
      reflection-engine:
        condition: service_healthy
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      ALLOWED_USER_IDS: ${ALLOWED_USER_IDS}
      PREDICTION_API_URL: "http://prediction-api:8000"
      LEARNING_ENGINE_URL: "http://learning-engine:8001"
      REFLECTION_ENGINE_URL: "http://reflection-engine:8002"
      OPPORTUNITY_ENGINE_URL: "http://opportunity-engine:8005"
      PREDICTION_QUEUE_URL: "http://prediction-queue:8006"
      RISK_MANAGER_URL: "http://risk-manager:8004"
      OLLAMA_URL: "http://ollama:11434"
      SEARXNG_URL: "http://searxng:8080"
      CONFIDENCE_CALIBRATION_ENABLED: ${CONFIDENCE_CALIBRATION_ENABLED:-true}
      DISCORD_NOTIFICATIONS_ENABLED: ${DISCORD_NOTIFICATIONS_ENABLED:-true}
      DISCORD_NOTIFICATION_CHANNEL_ID: ${DISCORD_NOTIFICATION_CHANNEL_ID:-}
    restart: unless-stopped
    healthcheck:
      # The bot writes /tmp/bot_ready when on_ready fires successfully.
      test: ["CMD", "test", "-f", "/tmp/bot_ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # --- Kalshi Connector ---
  # HTTP abstraction layer for the Kalshi prediction market API.
  # Normalizes Kalshi responses into platform-friendly models; no trading
  # strategy lives here. Requires KALSHI_API_KEY and KALSHI_PRIVATE_KEY_PATH.
  # SPEC-018: also runs an outcome collection loop (OUTCOME_COLLECTION_ENABLED).
  # Set KALSHI_ENVIRONMENT=production or demo in .env.
  # See docs/KALSHI_CONNECTOR.md.
  kalshi-connector:
    build: ../services/kalshi-connector
    container_name: kalshi-connector
    networks:
      - internal
    ports:
      # Localhost only — for local clients and development tooling.
      - "127.0.0.1:${KALSHI_CONNECTOR_PORT}:8003"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount the private key file read-only inside the container.
      # The path inside the container matches KALSHI_PRIVATE_KEY_PATH.
      - ./keys/kalshi_private.key:/app/keys/kalshi_private.key:ro
    environment:
      KALSHI_API_KEY: ${KALSHI_API_KEY}
      KALSHI_PRIVATE_KEY_PATH: ${KALSHI_PRIVATE_KEY_PATH}
      KALSHI_ENVIRONMENT: ${KALSHI_ENVIRONMENT:-production}
      POSTGRES_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      OUTCOME_COLLECTION_ENABLED: ${OUTCOME_COLLECTION_ENABLED:-true}
      OUTCOME_POLL_SECONDS: ${OUTCOME_POLL_SECONDS:-300}
      LEARNING_ENGINE_URL: "http://learning-engine:8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # --- Risk Manager ---
  # Evaluates prediction proposals against configurable risk rules and
  # determines whether a trade is permitted. Fetches account state from
  # kalshi-connector; persists decisions to PostgreSQL.
  # DRY_RUN=true by default — no trade is approved until explicitly enabled.
  # See docs/RISK_MANAGER.md.
  risk-manager:
    build: ../services/risk-manager
    container_name: risk-manager
    networks:
      - internal
    ports:
      # Localhost only — for local clients and development tooling.
      - "127.0.0.1:${RISK_MANAGER_PORT}:8004"
    depends_on:
      postgres:
        condition: service_healthy
      kalshi-connector:
        condition: service_healthy
    environment:
      KALSHI_CONNECTOR_URL: "http://kalshi-connector:8003"
      POSTGRES_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      MIN_CONFIDENCE: ${MIN_CONFIDENCE:-0.60}
      MIN_EXPECTED_VALUE: ${MIN_EXPECTED_VALUE:-0.01}
      MIN_EDGE: ${MIN_EDGE:-0.05}
      MAX_POSITION_PERCENT: ${MAX_POSITION_PERCENT:-5.0}
      MAX_OPEN_POSITIONS: ${MAX_OPEN_POSITIONS:-10}
      MAX_DAILY_LOSS: ${MAX_DAILY_LOSS:-10000}
      MAX_CONSECUTIVE_LOSSES: ${MAX_CONSECUTIVE_LOSSES:-5}
      DRY_RUN: ${DRY_RUN:-true}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # --- Prediction Queue Manager ---
  # Traffic controller and autonomous workflow orchestrator.  Maintains a
  # priority-ordered queue of markets, runs the predict/evaluate/trade cycle
  # on each scheduled tick, and records results in PostgreSQL.
  # WORKFLOW_ENABLED=true by default; DRY_RUN=true prevents live orders.
  # See docs/PREDICTION_QUEUE.md.
  prediction-queue:
    build: ../services/prediction-queue
    container_name: prediction-queue
    networks:
      - internal
    ports:
      # Localhost only — for local clients and development tooling.
      - "127.0.0.1:${PREDICTION_QUEUE_PORT}:8006"
    depends_on:
      postgres:
        condition: service_healthy
      opportunity-engine:
        condition: service_healthy
    environment:
      POSTGRES_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      OPPORTUNITY_ENGINE_URL: "http://opportunity-engine:8005"
      QUEUE_MAX_SIZE: ${QUEUE_MAX_SIZE:-100}
      QUEUE_REFRESH_SECONDS: ${QUEUE_REFRESH_SECONDS:-30}
      QUEUE_EXPIRATION_BUFFER_SECONDS: ${QUEUE_EXPIRATION_BUFFER_SECONDS:-60}
      QUEUE_PRIORITY_WEIGHT: ${QUEUE_PRIORITY_WEIGHT:-0.70}
      QUEUE_WAIT_WEIGHT: ${QUEUE_WAIT_WEIGHT:-0.30}
      WORKFLOW_ENABLED: ${WORKFLOW_ENABLED:-true}
      WORKFLOW_INTERVAL_SECONDS: ${WORKFLOW_INTERVAL_SECONDS:-30}
      DRY_RUN: ${DRY_RUN:-true}
      PREDICTION_API_URL: "http://prediction-api:8000"
      RISK_MANAGER_URL: "http://risk-manager:8004"
      KALSHI_CONNECTOR_URL: "http://kalshi-connector:8003"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # --- Opportunity Engine ---
  # Discovers active Kalshi markets and assigns priority tiers using
  # deterministic scoring (time-to-expiry, volume, spread, liquidity,
  # activity). No AI, no trading — pure analysis and ranking.
  # The scheduler runs on a configurable interval; POST /refresh triggers
  # an immediate scan. See docs/OPPORTUNITY_ENGINE.md.
  opportunity-engine:
    build: ../services/opportunity-engine
    container_name: opportunity-engine
    networks:
      - internal
    ports:
      # Localhost only — for local clients and development tooling.
      - "127.0.0.1:${OPPORTUNITY_ENGINE_PORT}:8005"
    depends_on:
      postgres:
        condition: service_healthy
      kalshi-connector:
        condition: service_healthy
    environment:
      KALSHI_CONNECTOR_URL: "http://kalshi-connector:8003"
      POSTGRES_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      DISCOVERY_INTERVAL_SECONDS: ${DISCOVERY_INTERVAL_SECONDS:-300}
      MAX_TIER2_MARKETS: ${MAX_TIER2_MARKETS:-100}
      MAX_TIER3_MARKETS: ${MAX_TIER3_MARKETS:-30}
      MIN_PRIORITY_SCORE: ${MIN_PRIORITY_SCORE:-5.0}
      PREDICTION_QUEUE_URL: "http://prediction-queue:8006"
      PUBLISH_TO_QUEUE: ${PUBLISH_TO_QUEUE:-true}
      QUEUE_PUBLISH_BATCH_SIZE: ${QUEUE_PUBLISH_BATCH_SIZE:-30}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
